# =============================================================================
# Macro Cockpit — Docker Compose
#
# 使い方(リポジトリ直下から。Makefile のターゲット経由が簡単):
#   make docker-build   # イメージをビルド(web + fetcher/scheduler 共有イメージ)
#   make docker-fetch   # 1回だけ取得(ワンショット。手動実行用)
#   make docker-up      # web + scheduler を常駐起動 -> http://localhost:37414
#   make docker-down    # 停止・後片付け
#
# 定期取得は scheduler サービス(常駐)が毎日 FETCH_AT に行うため cron は不要。
# SPEC §3 の「常駐なし」は、Docker 運用ではユーザー指示により scheduler 常駐へ
# 意図的に変更した(README「Docker での起動」参照)。
#
# 直接叩く場合はいずれも:
#   docker compose -f docker/docker-compose.yml <cmd>
#
# ボリューム/パスは「このファイルの位置(docker/)」からの相対。
#   ../data   = リポジトリ直下 data/(唯一の蓄積データ)
#   ../config = リポジトリ直下 config/(regime.yaml)
#   ../.env   = リポジトリ直下 .env(FRED_API_KEY 等。fetch 前に用意しておく)
# =============================================================================

# -f docker/docker-compose.yml で起動してもプロジェクト名が「docker」にならない
# ように明示する(他リポジトリの同名構成との衝突・不明瞭なコンテナ名を回避)。
name: macro-cockpit

services:
  # --- ダッシュボード(Next.js)。DB と regime.yaml を「読むだけ」 ---------------
  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    image: macro-cockpit-web
    ports:
      # ホスト側ポートは MACRO_WEB_PORT で上書き可能(既定 37414。コンテナ内部は
      # 3000 のまま)。${...} の展開は docker/.env またはシェル環境変数から行われる
      # (compose はこのファイルと同じディレクトリの .env を読む。リポジトリ直下の
      # .env は fetcher/scheduler の env_file 用で、compose 変数展開には使われない)。
      - "${MACRO_WEB_PORT:-37414}:3000"
    volumes:
      # web は蓄積データを読み取り専用でマウントする(書き込みは scheduler/fetcher だけ)。
      - ../data:/app/data:ro
      # regime.yaml も読むだけ。ホスト側を編集してブラウザ再読込で反映される
      # (web の WORKDIR は /app/web。lib/panels.ts は ../config/regime.yaml を読む)。
      - ../config:/app/config:ro
    environment:
      MACRO_DB_PATH: /app/data/macro.sqlite
      TZ: Asia/Tokyo
    restart: unless-stopped

  # --- 常駐スケジューラ。毎日 FETCH_AT に全系列を取得(cron 不要)----------------
  # fetcher と同一イメージ(macro-cockpit-fetcher)を共有し、command だけ
  # 差し替えて python -m fetcher.scheduler を常駐させる(ビルドは実質1回)。
  scheduler:
    build:
      context: ..
      dockerfile: docker/fetcher.Dockerfile
    image: macro-cockpit-fetcher
    command: ["uv", "run", "--frozen", "python", "-m", "fetcher.scheduler"]
    env_file:
      - ../.env
    volumes:
      # scheduler(内部で fetcher.main を実行)は data/ に書き込む(UPSERT)。
      - ../data:/app/data
    environment:
      MACRO_DB_PATH: /app/data/macro.sqlite
      TZ: Asia/Tokyo
      # 毎日の取得時刻(HH:MM、Asia/Tokyo)。ホスト環境変数 or docker/.env で
      # 上書き可能。取引システムに影響しない時間帯を選ぶこと(SPEC §4.4)。
      FETCH_AT: "${FETCH_AT:-06:30}"
      # 起動直後にも1回取得する(既定)。"0" で無効化。
      # 注意: 起動時取得は FETCH_AT と違い時刻を選ばない。restart: unless-stopped
      # のためホスト/デーモン再起動やクラッシュ復帰でも即実行され、IB 一次ソース
      # 環境では取引セッション中にワンショット接続が走り得る。IB を一次ソースに
      # する場合は FETCH_ON_START=0 を推奨(SPEC §4.4、README「起動直後の取得」)。
      FETCH_ON_START: "${FETCH_ON_START:-1}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    # profiles は付けない = docker compose up で web と一緒に常駐起動する。

  # --- 取得バッチ(手動ワンショット用。profiles で up 対象から外す)---------------
  fetcher:
    build:
      context: ..
      dockerfile: docker/fetcher.Dockerfile
    image: macro-cockpit-fetcher
    # FRED_API_KEY / ESTAT_APP_ID / IB_* を環境変数として渡す(.env はイメージに入れない)。
    env_file:
      - ../.env
    volumes:
      # fetcher だけが書き込む(UPSERT)。読み書き可でマウント。
      - ../data:/app/data
    environment:
      MACRO_DB_PATH: /app/data/macro.sqlite
      TZ: Asia/Tokyo
    # Linux ホストで、コンテナから host.docker.internal 経由でホストの
    # TWS / IB Gateway に届くようにする(.env の IB_HOST=host.docker.internal と整合)。
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # up では起動せず、docker compose run --rm fetcher で1回実行する(手動用)。
    # 定期取得は scheduler サービスが担う。
    profiles: ["fetch"]
